<!DOCTYPE html>
<html>
<head>
    <title>Aura Profile</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; border-top: 5px solid #1a73e8; }
        h1 { color: #1a73e8; margin-bottom: 0.5rem; }
        p { color: #666; font-size: 1.1rem; }
        .status { display: inline-block; padding: 5px 15px; background: #e8f0fe; color: #1a73e8; border-radius: 20px; font-weight: bold; margin: 1rem 0; }
        a { display: block; margin-top: 1.5rem; color: #1a73e8; text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>{model.username}'s Profile</h1>
        <div class="status">ID: {model.userId} | Status: {model.status}</div>
        <p>Welcome to your personal dashboard. You are rank <b>#{model.rank}</b> in our system.</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 1.5rem 0;">
        <a href="/getStatus">Check Global System Status</a>
    </div>
</body>
</html>
